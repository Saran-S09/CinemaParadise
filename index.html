<!DOCTYPE html>
<html>
<head>
  <title> Film Roll 🎬</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <div class="logo">🎬 Film Roll </div>

  <div class="nav-right">
    <input type="text" id="search" placeholder="Search movies..." />
    <button id="searchBtn">🔍</button>
  </div>
</header>

<!-- HERO -->
<div class="hero">

  <!-- SLIDER -->
  <div class="hero-slider" id="heroSlider"></div>

  <!-- CONTENT -->
  <div class="hero-overlay">
    <div class="hero-content">
      <h1 id="heroTitle"></h1>
      <p id="heroDesc"></p>
      <button id="heroBtn">▶ Watch Now</button>
    </div>
  </div>

</div>
<!-- GLOBAL -->
<h2>🔥 Trending</h2>
<div id="trending" class="row"></div>

<h2>⭐ Popular</h2>
<div id="popular" class="row"></div>

<!-- TAMIL SECTIONS -->
<h2>🎬 Tamil Recent</h2>
<div id="tamilRecent" class="row"></div>

<h2>🇮🇳 Tamil Popular</h2>
<div id="tamilPopular" class="row"></div>

<script src="app.js"></script>
</body>
</html>
