<!DOCTYPE html>
<html>
<head>
  <title>Movie Details</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<button onclick="goBack()" class="back-btn">⬅ Back</button>

<div class="movie-container">

  <!-- LEFT -->
  <div class="left">
    <img id="poster" class="poster">
  </div>

  <!-- RIGHT -->
  <div class="right">
    <h1 id="title"></h1>
    <p id="rating" class="rating"></p>

    <p><b>Director:</b> <span id="director"></span></p>
    <p><b>Music:</b> <span id="music"></span></p>

    <p id="overview" class="overview"></p>

    <h3 class="trailer-title">🎬 Trailer</h3>
    <iframe id="trailer" allow="autoplay; encrypted-media" allowfullscreen></iframe>
  </div>

</div>

<script src="movie.js"></script>
</body>
</html>
