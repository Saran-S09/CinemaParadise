<!DOCTYPE html>
<html>
<head>
  <title>Movie Details</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<button onclick="goBack()" class="back-btn">⬅ Back</button>

<div class="details-container">

  <!-- LEFT -->
  <div class="details-left">
    <img id="poster" class="poster">
  </div>

  <!-- RIGHT -->
  <div class="details-right">
    <h1 id="title"></h1>
    <p id="rating" class="rating"></p>

    <div id="genres" class="tv-genres"></div>
    <div id="meta" class="tv-meta-row"></div>

    <div class="crew-info">
      <p><b>Director:</b> <span id="director"></span></p>
      <p><b>Music:</b> <span id="music"></span></p>
    </div>

    <p id="overview" class="overview"></p>
  </div>

</div>

<!-- 🎬 TRAILER SECTION (BELOW) -->
<div class="full-section">
  <h2>🎬 Trailer</h2>
  <select id="trailerSelect" class="trailer-select"></select>
  <div class="trailer-box">
    <iframe id="trailer" allow="autoplay; encrypted-media" allowfullscreen></iframe>
  </div>
  <div id="trailerFallback"></div>
</div>

<script src="movie.js"></script>
</body>
</html>
