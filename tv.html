<!DOCTYPE html>
<html>
<head>
  <title>TV Show Details</title>
  <link rel="stylesheet" href="style.css?v=999">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<button onclick="goBack()" class="back-btn">⬅ Back</button>

<div class="details-container">

  <div class="details-left">
    <img id="poster" class="poster">
  </div>

  <div class="details-right">
    <h1 id="title"></h1>
    <p id="rating" class="rating"></p>
    <div id="genres" class="tv-genres"></div>
    <div id="meta" class="tv-meta-row"></div>
    <p id="overview" class="overview"></p>
  </div>

</div>

<!-- 🎬 TRAILER -->
<div class="full-section">
  <h2>🎬 Trailer</h2>
  <select id="trailerSelect" class="trailer-select"></select>
  <div class="trailer-box">
    <iframe id="trailer" allowfullscreen></iframe>
  </div>
</div>

<!-- 📺 SEASONS -->
<div class="full-section">
  <h2>📺 Seasons</h2>
  <div id="seasonList" class="season-row"></div>
</div>

<!-- SEASON DETAILS -->
<div id="seasonDetails"></div>

<script src="tv.js"></script>
</body>
</html>
